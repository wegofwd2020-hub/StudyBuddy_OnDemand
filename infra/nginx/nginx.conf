worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream api {
        server api:8000;
        keepalive 32;   # reuse connections to gunicorn workers
    }

    # ── Rate Limit Zones ──────────────────────────────────────────────────────
    # Auth endpoints: 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    # Content endpoints: 100 requests/minute per student JWT
    limit_req_zone $http_authorization  zone=content:10m rate=100r/m;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name yourdomain.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # ── Block /metrics from public ────────────────────────────────────────
        # Prometheus scrapes from internal network only.
        location /metrics {
            allow 10.0.0.0/8;
            deny  all;
            proxy_pass http://api;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
        }

        # ── Auth endpoints — strict rate limit ────────────────────────────────
        location ~ ^/api/v1/(auth|admin/auth)/ {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Health endpoint — no rate limiting ────────────────────────────────
        location /health {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── All other API endpoints ────────────────────────────────────────────
        location / {
            limit_req zone=content burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection      "";   # keep-alive to upstream
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
