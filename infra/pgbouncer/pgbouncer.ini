[databases]
studybuddy = host=db port=5432 dbname=studybuddy

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — stateless; works correctly with asyncpg
pool_mode = transaction
max_client_conn = 200
default_pool_size = 50

; Timeouts (seconds)
server_idle_timeout = 60
client_idle_timeout = 120
query_timeout = 30

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

; Admin interface
admin_users = pgbouncer_admin

; TLS (uncomment for production)
; server_tls_sslmode = require
; server_tls_ca_file = /etc/pgbouncer/ca.crt
