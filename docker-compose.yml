version: "3.9"

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: studybuddy
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybuddy -d studybuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (with AOF persistence — mandatory in production) ────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── PgBouncer (connection pooler) ─────────────────────────────────────────
  pgbouncer:
    image: bitnami/pgbouncer:1.22
    restart: unless-stopped
    environment:
      POSTGRESQL_HOST: db
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: studybuddy
      POSTGRESQL_USERNAME: studybuddy
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "200"
      PGBOUNCER_DEFAULT_POOL_SIZE: "50"
      PGBOUNCER_AUTH_TYPE: md5
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://studybuddy:${POSTGRES_PASSWORD}@pgbouncer:6432/studybuddy
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - content_store:/data/content

  # ── Celery workers ────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A src.auth.tasks.celery_app worker -Q io,default --concurrency=4 --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://studybuddy:${POSTGRES_PASSWORD}@pgbouncer:6432/studybuddy
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - content_store:/data/content

volumes:
  postgres_data:
  redis_data:
  content_store:
