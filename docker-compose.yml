# =============================================================================
# StudyBuddy OnDemand — Docker Compose (Local Development)
#
# Services
# ────────────────────────────────────────────────────────────────────────────
#   db              PostgreSQL 16           localhost:5432
#   redis           Redis 7 (AOF on)        localhost:6379
#   pgbouncer       PgBouncer 1.22          localhost:6432
#   migrate         Alembic (one-shot)      exits after migrations
#   api             FastAPI (uvicorn)       localhost:8000
#   celery-worker   Celery io+default       (background)
#   celery-pipeline Celery pipeline queue   (background)
#   celery-beat-primary   Celery Beat (RedBeat primary)  (background)
#   celery-beat-standby   Celery Beat (RedBeat standby)  (background)
#   web             Next.js dev server      localhost:3000
#   stripe-cli      Stripe webhook relay    profile: stripe
#
# Quick start
# ────────────────────────────────────────────────────────────────────────────
#   ./local-setup.sh          # first-time setup + start
#   docker compose up         # subsequent starts
#   docker compose down       # stop all
#   docker compose down -v    # stop + delete volumes (fresh DB)
#
# Pipeline (run on-demand — does NOT start automatically)
# ────────────────────────────────────────────────────────────────────────────
#   docker compose run --rm pipeline python seed_default.py --year 2026
#   docker compose run --rm pipeline python build_grade.py --grade 8 --lang en,fr
#   docker compose run --rm pipeline python build_unit.py --curriculum-id default-2026-g8 --unit G8-MATH-001 --lang en
#
# Stripe (local webhook testing — requires Stripe CLI installed)
# ────────────────────────────────────────────────────────────────────────────
#   docker compose --profile stripe up stripe-cli
# =============================================================================


# ---------------------------------------------------------------------------
# Shared environment helpers
# ---------------------------------------------------------------------------
x-api-env: &api-env
  DATABASE_URL: postgresql://studybuddy:${POSTGRES_PASSWORD}@pgbouncer:5432/studybuddy
  DIRECT_DB_URL: postgresql://studybuddy:${POSTGRES_PASSWORD}@db:5432/studybuddy
  TEST_DB_URL: postgresql://studybuddy:${POSTGRES_PASSWORD}@db:5432/studybuddy_test
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  CONTENT_STORE_PATH: /data/content

x-depends-infra: &depends-infra
  db:
    condition: service_healthy
  redis:
    condition: service_healthy
  pgbouncer:
    condition: service_started

x-depends-migrated: &depends-migrated
  migrate:
    condition: service_completed_successfully

x-depends-all: &depends-all
  db:
    condition: service_healthy
  redis:
    condition: service_healthy
  pgbouncer:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: studybuddy
      POSTGRES_USER: studybuddy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=trust"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studybuddy -d studybuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis (AOF persistence — mandatory) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── PgBouncer (transaction-pooling, max 200 client connections) ─────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: studybuddy
      DB_USER: studybuddy
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "50"
      AUTH_TYPE: md5
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U studybuddy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  # ── Alembic migrations (one-shot — exits when done) ──────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: [
      "sh", "-c",
      "alembic upgrade head && echo '[migrate] All migrations applied.' && if [ \"$$APP_ENV\" = 'development' ]; then echo '[migrate] Seeding dev content ...' && python scripts/seed_dev_content.py && echo '[migrate] Dev seed complete.'; fi"
    ]
    env_file:
      - .env
    environment:
      <<: *api-env
      # Migrations connect directly to Postgres — pgbouncer's transaction-pooling
      # mode is incompatible with Alembic's DDL transaction management.
      DATABASE_URL: postgresql://studybuddy:${POSTGRES_PASSWORD}@db:5432/studybuddy
      # Unset TEST_DB_URL so env.py targets the dev DB, not studybuddy_test.
      TEST_DB_URL: ""
    volumes:
      - ./backend:/app          # bind-mount source so new migrations are picked up without rebuilding
      - ./data:/data            # grade JSON files needed by seed script
      - content_store:/data/content
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── Backend API (FastAPI + uvicorn, hot-reload) ─────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Override production gunicorn CMD with uvicorn --reload for local dev
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # bind-mount source for hot-reload
      - ./pipeline:/pipeline    # pipeline module available for backend/tests/test_pipeline.py
      - ./data:/data            # grade JSON files (grade5_stem.json … grade12_stem.json)
      - content_store:/data/content
    depends_on:
      <<: *depends-all
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery worker — io + default queues ─────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A src.core.celery_app worker
      -Q io,default
      --concurrency=4
      --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-env
    volumes:
      - ./backend:/app
      - content_store:/data/content
    depends_on:
      <<: *depends-all

  # ── Celery worker — pipeline queue ──────────────────────────────────────────
  celery-pipeline:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A src.core.celery_app worker
      -Q pipeline
      --concurrency=2
      --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-env
      # Pipeline worker also needs the Anthropic key for triggered jobs
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
      - ./pipeline:/pipeline
      - ./data:/data
      - content_store:/data/content
    depends_on:
      <<: *depends-all

  # ── Celery Beat — primary (RedBeat distributed scheduler) ───────────────────
  #
  # Two Beat instances run simultaneously.  RedBeat uses a Redis lock so only
  # one dispatches tasks at a time.  If the primary crashes, the standby
  # acquires the lock within REDBEAT_LOCK_TIMEOUT seconds (default: 5 min)
  # and resumes task dispatch — eliminating the single-point-of-failure.
  #
  # Note: --schedule is omitted.  RedBeat stores state in Redis, not a file.
  celery-beat-primary:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A src.core.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-env
    volumes:
      - ./backend:/app
      - content_store:/data/content
    depends_on:
      <<: *depends-all

  # ── Celery Beat — standby (waits for primary lock to expire on crash) ────────
  celery-beat-standby:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A src.core.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *api-env
    volumes:
      - ./backend:/app
      - content_store:/data/content
    depends_on:
      <<: *depends-all

  # ── Next.js Web Frontend (dev server with hot-reload) ───────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: deps            # stop at deps stage — dev uses mounted source
    command: npm run dev
    restart: unless-stopped
    env_file:
      - ./web/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_CDN_URL: http://localhost:8000
      # Server-side only — uses Docker service name (not localhost)
      INTERNAL_API_URL: http://api:8000/api/v1
      # Tell Next.js to allow connections from Docker network
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app                     # bind-mount source for hot-reload
      - /app/node_modules              # keep container node_modules separate
      - /app/.next                     # keep build cache in container
    depends_on:
      api:
        condition: service_healthy

  # ── Pipeline CLI (on-demand — not started automatically) ────────────────────
  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      CONTENT_STORE_PATH: /data/content
      DATABASE_URL: postgresql://studybuddy:${POSTGRES_PASSWORD}@pgbouncer:5432/studybuddy
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./pipeline:/pipeline
      - ./backend:/backend
      - ./data:/data
      - content_store:/data/content
    depends_on:
      <<: *depends-all
    profiles:
      - pipeline                       # only starts with: docker compose --profile pipeline run pipeline ...

  # ── Stripe CLI (local webhook relay — opt-in) ────────────────────────────────
  stripe-cli:
    image: stripe/stripe-cli:latest
    command: >
      listen
      --api-key ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      --forward-to http://api:8000/api/v1/subscription/webhook
      --skip-verify
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - stripe                         # only starts with: docker compose --profile stripe up

# ---------------------------------------------------------------------------
# Named volumes (data persists across docker compose down / up cycles)
# Use `docker compose down -v` to wipe everything and start fresh.
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  content_store:
    driver: local
