<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="Inter, system-ui, sans-serif" font-size="13">
  <title>First Login Flow</title>
  <desc>Default password email to forced password reset to portal access</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Email received -->
  <rect x="150" y="20" width="200" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="40" text-anchor="middle" fill="#1a202c" font-weight="600">Welcome email received</text>
  <text x="250" y="56" text-anchor="middle" fill="#64748b" font-size="11">Contains temp password + portal URL</text>

  <line x1="250" y1="66" x2="250" y2="96" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Enter credentials -->
  <rect x="150" y="96" width="200" height="46" rx="6" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="250" y="116" text-anchor="middle" fill="#1a202c" font-weight="600">Enter email + temp password</text>
  <text x="250" y="132" text-anchor="middle" fill="#64748b" font-size="11">Login page</text>

  <line x1="250" y1="142" x2="250" y2="172" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- System: detect first_login -->
  <rect x="150" y="172" width="200" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="192" text-anchor="middle" fill="#1a202c" font-weight="600">System detects first_login=true</text>
  <text x="250" y="208" text-anchor="middle" fill="#64748b" font-size="11">Intercepts navigation to portal</text>

  <line x1="250" y1="218" x2="250" y2="248" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Force password change -->
  <rect x="150" y="248" width="200" height="56" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="250" y="268" text-anchor="middle" fill="#1a202c" font-weight="700">Change password required</text>
  <text x="250" y="284" text-anchor="middle" fill="#64748b" font-size="11">Cannot access any other page</text>
  <text x="250" y="298" text-anchor="middle" fill="#64748b" font-size="11">until password is set</text>

  <line x1="250" y1="304" x2="250" y2="334" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Portal access -->
  <rect x="150" y="334" width="200" height="46" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="354" text-anchor="middle" fill="#166534" font-weight="700">Portal access granted</text>
  <text x="250" y="370" text-anchor="middle" fill="#166534" font-size="11">first_login cleared permanently</text>
</svg>
