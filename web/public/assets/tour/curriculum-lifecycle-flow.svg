<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" font-family="Inter, system-ui, sans-serif" font-size="13">
  <title>Curriculum Lifecycle Flow</title>
  <desc>Definition submission to approval to build to classroom assignment</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Step 1: Submit definition -->
  <rect x="185" y="20" width="230" height="50" rx="6" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="300" y="40" text-anchor="middle" fill="#1a202c" font-weight="600">Submit curriculum definition</text>
  <text x="300" y="58" text-anchor="middle" fill="#64748b" font-size="11">Name, grade, subjects, units, languages</text>

  <line x1="300" y1="70" x2="300" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Status: pending -->
  <rect x="210" y="100" width="180" height="32" rx="16" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="300" y="121" text-anchor="middle" fill="#92400e" font-weight="600" font-size="12">pending_approval</text>

  <line x1="300" y1="132" x2="300" y2="162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Platform review -->
  <rect x="185" y="162" width="230" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="300" y="182" text-anchor="middle" fill="#1a202c" font-weight="600">Platform review</text>
  <text x="300" y="198" text-anchor="middle" fill="#64748b" font-size="11">Checks grade suitability, content safety</text>

  <line x1="300" y1="212" x2="300" y2="242" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision: approved? -->
  <polygon points="300,242 385,272 300,302 215,272" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="300" y="268" text-anchor="middle" fill="#1a202c" font-size="12" font-weight="500">Approved?</text>

  <!-- Rejected path (right) -->
  <line x1="385" y1="272" x2="480" y2="272" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="430" y="262" text-anchor="middle" fill="#ef4444" font-size="11">Rejected</text>
  <rect x="480" y="248" width="100" height="48" rx="6" fill="#fff1f2" stroke="#f87171" stroke-width="1.5"/>
  <text x="530" y="266" text-anchor="middle" fill="#991b1b" font-weight="500" font-size="11">Rejection</text>
  <text x="530" y="281" text-anchor="middle" fill="#991b1b" font-weight="500" font-size="11">reason shown</text>
  <text x="530" y="296" text-anchor="middle" fill="#64748b" font-size="10">Submit revised</text>
  <!-- arrow back up -->
  <line x1="530" y1="248" x2="530" y2="45" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="530" y1="45" x2="415" y2="45" stroke="#f87171" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

  <!-- Approved path (down) -->
  <line x1="300" y1="302" x2="300" y2="330" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="315" y="320" fill="#16a34a" font-size="11">Approved</text>

  <!-- Status: approved -->
  <rect x="210" y="330" width="180" height="32" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="300" y="351" text-anchor="middle" fill="#166534" font-weight="600" font-size="12">approved</text>

  <line x1="300" y1="362" x2="300" y2="392" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Estimate + Trigger -->
  <rect x="185" y="392" width="230" height="50" rx="6" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="300" y="410" text-anchor="middle" fill="#1a202c" font-weight="600">Estimate cost → Trigger build</text>
  <text x="300" y="428" text-anchor="middle" fill="#64748b" font-size="11">Stripe charge if allowance exhausted</text>

  <line x1="300" y1="442" x2="300" y2="472" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Pipeline -->
  <rect x="185" y="472" width="230" height="50" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="300" y="490" text-anchor="middle" fill="#1a202c" font-weight="600">AI content pipeline runs</text>
  <text x="300" y="508" text-anchor="middle" fill="#64748b" font-size="11">Lessons · Quizzes · Audio · Tutorials</text>

  <!-- final arrow to classroom -->
  <line x1="300" y1="522" x2="300" y2="530" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="300" y="540" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="600">→ Assign to classroom</text>
</svg>
