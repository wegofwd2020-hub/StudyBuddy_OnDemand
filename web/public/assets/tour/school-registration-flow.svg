<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 520" font-family="Inter, system-ui, sans-serif" font-size="13">
  <title>School Registration Flow</title>
  <desc>End-to-end sequence for registering a school and completing first setup</desc>

  <!-- ── Legend ── -->
  <rect x="20" y="10" width="520" height="30" rx="4" fill="#f8f9fa" stroke="#e2e8f0"/>
  <rect x="30" y="18" width="14" height="14" rx="3" fill="#7c3aed" opacity="0.15" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="50" y="29" fill="#64748b" font-size="11">User action</text>
  <rect x="130" y="18" width="14" height="14" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="150" y="29" fill="#64748b" font-size="11">System action</text>
  <polygon points="240,18 247,25 240,32 233,25" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="255" y="29" fill="#64748b" font-size="11">Decision</text>

  <!-- ── Start ── -->
  <ellipse cx="280" cy="70" rx="60" ry="22" fill="#7c3aed" stroke="none"/>
  <text x="280" y="75" text-anchor="middle" fill="white" font-weight="600">Start</text>

  <!-- arrow -->
  <line x1="280" y1="92" x2="280" y2="118" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1: Visit registration page -->
  <rect x="165" y="118" width="230" height="46" rx="6" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="280" y="136" text-anchor="middle" fill="#1a202c" font-weight="500">Visit school registration page</text>
  <text x="280" y="153" text-anchor="middle" fill="#64748b" font-size="11">/register or landing page CTA</text>

  <line x1="280" y1="164" x2="280" y2="190" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Enter details -->
  <rect x="165" y="190" width="230" height="46" rx="6" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="280" y="208" text-anchor="middle" fill="#1a202c" font-weight="500">Enter school name, email,</text>
  <text x="280" y="223" text-anchor="middle" fill="#1a202c" font-weight="500">country, password</text>

  <line x1="280" y1="236" x2="280" y2="262" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: System creates school -->
  <rect x="165" y="262" width="230" height="46" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="280" y="280" text-anchor="middle" fill="#1a202c" font-weight="500">System creates school record,</text>
  <text x="280" y="295" text-anchor="middle" fill="#1a202c" font-weight="500">issues JWT, sends welcome email</text>

  <line x1="280" y1="308" x2="280" y2="334" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision: first_login -->
  <polygon points="280,334 355,362 280,390 205,362" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="280" y="358" text-anchor="middle" fill="#1a202c" font-size="12" font-weight="500">first_login</text>
  <text x="280" y="373" text-anchor="middle" fill="#1a202c" font-size="12">required?</text>

  <!-- Yes path (left) -->
  <line x1="205" y1="362" x2="120" y2="362" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="160" y="355" text-anchor="middle" fill="#ca8a04" font-size="11">Yes</text>
  <rect x="30" y="340" width="90" height="44" rx="6" fill="#7c3aed" opacity="0.1" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="75" y="358" text-anchor="middle" fill="#1a202c" font-weight="500" font-size="11">Change</text>
  <text x="75" y="373" text-anchor="middle" fill="#1a202c" font-weight="500" font-size="11">password</text>

  <line x1="75" y1="384" x2="75" y2="430" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="75" y1="430" x2="280" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- No path (right) -->
  <line x1="355" y1="362" x2="420" y2="362" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="385" y="355" text-anchor="middle" fill="#64748b" font-size="11">No</text>
  <line x1="420" y1="362" x2="420" y2="430" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="420" y1="430" x2="310" y2="430" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- End: Dashboard -->
  <rect x="165" y="420" width="230" height="46" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="280" y="438" text-anchor="middle" fill="#1a202c" font-weight="600">School dashboard</text>
  <text x="280" y="453" text-anchor="middle" fill="#64748b" font-size="11">Setup checklist visible if school is empty</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
