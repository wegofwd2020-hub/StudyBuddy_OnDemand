name: E2E — Student Critical Paths

on:
  pull_request:

# Cancel in-progress runs on the same branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright — Student Flow (3 critical paths)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run student critical-path tests
        run: npx playwright test --project=chromium tests/e2e/student_flow.spec.ts
        env:
          BASE_URL: http://localhost:3000
          # Fake Auth0 env vars — no real tenant needed.
          # The Next.js dev server uses these so auth0.getSession() initialises
          # without crashing; tests use sb_dev_session cookie instead.
          AUTH0_SECRET: e2e-placeholder-secret-not-used-in-prod-aaaaaaaaaa
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://test.auth0.example.com
          AUTH0_CLIENT_ID: test_client_id
          AUTH0_CLIENT_SECRET: test_client_secret
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: web/playwright-report/
          retention-days: 7
