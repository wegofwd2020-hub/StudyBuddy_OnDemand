name: CI

on:
  push:
    branches: [main, "2026*", "feat/*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend lint + security ───────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install quality tools
        working-directory: backend
        run: pip install ruff==0.9.10 bandit[toml]==1.8.3 pip-audit==2.7.3

      - name: Ruff — lint
        working-directory: backend
        run: ruff check src/

      - name: Ruff — format check
        working-directory: backend
        run: ruff format --check src/

      - name: Bandit — security SAST
        working-directory: backend
        run: bandit -c pyproject.toml -r src/ -ll

      - name: pip-audit — dependency vulnerability scan
        working-directory: backend
        # PYSEC-2024-55: previously ignored
        # GHSA-5239-wwwm-4pmq: pygments transitive dep — no upstream fix available yet
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-55 --ignore-vuln GHSA-5239-wwwm-4pmq

  # ── 2. Backend tests + coverage ──────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studybuddy_test
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://studybuddy:testpassword@localhost:5432/studybuddy_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: test-secret-do-not-use-in-production-aaaa
      ADMIN_JWT_SECRET: test-admin-secret-do-not-use-in-prod-bbb
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_JWKS_URL: http://localhost:9999/.well-known/jwks.json
      AUTH0_STUDENT_CLIENT_ID: test-student-client-id
      AUTH0_TEACHER_CLIENT_ID: test-teacher-client-id
      AUTH0_MGMT_CLIENT_ID: test-mgmt-client-id
      AUTH0_MGMT_CLIENT_SECRET: test-mgmt-client-secret-aaaaaaaaaaa
      AUTH0_MGMT_API_URL: https://test.auth0.com/api/v2
      SENTRY_DSN: ""
      METRICS_TOKEN: test-metrics-token
      CONTENT_STORE_PATH: /tmp/studybuddy-test-content
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── 3. Frontend lint + typecheck ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: ESLint
        working-directory: web
        run: npm run lint -- --max-warnings=0

      - name: Prettier format check
        working-directory: web
        run: npm run format:check

      - name: TypeScript typecheck
        working-directory: web
        run: npm run typecheck

      - name: npm audit — dependency vulnerability scan
        working-directory: web
        run: npm audit --audit-level=high

  # ── 4. Frontend unit tests ───────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: web
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: web/test-results/

  # ── 5. Snyk — dependency vulnerability scan (SARIF → GitHub Security tab) ────
  snyk:
    name: Snyk — Vulnerability Scan
    runs-on: ubuntu-latest
    # Skip on fork PRs where SNYK_TOKEN is unavailable.
    if: ${{ secrets.SNYK_TOKEN != '' }}
    permissions:
      # Required to upload SARIF results to GitHub Code Scanning.
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Snyk CLI
        run: npm install -g snyk

      # Snyk needs deps installed to resolve the full dependency graph.
      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install Node.js dependencies
        working-directory: web
        run: npm ci

      # Run both scans with continue-on-error so the SARIF upload always runs.
      # Exit codes are captured in environment variables and checked at the end.
      - name: Snyk scan — Python (backend)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=backend/requirements.txt \
            --severity-threshold=high \
            --sarif-file-output=snyk-python.sarif \
            || echo "SNYK_PYTHON_FAILED=1" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Snyk scan — Node.js (web)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=web/package.json \
            --package-manager=npm \
            --severity-threshold=high \
            --sarif-file-output=snyk-node.sarif \
            || echo "SNYK_NODE_FAILED=1" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Upload Python SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-python.sarif
          category: snyk-python

      - name: Upload Node.js SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk-node.sarif
          category: snyk-node

      # Fail the job after SARIF upload so results are always visible in the
      # Security tab even when the PR is blocked.
      - name: Fail if high/critical vulnerabilities were found
        run: |
          if [ -n "$SNYK_PYTHON_FAILED" ] || [ -n "$SNYK_NODE_FAILED" ]; then
            echo "High or critical severity vulnerabilities found."
            echo "See the Security tab for details: https://github.com/${{ github.repository }}/security/code-scanning"
            exit 1
          fi

  # ── 6. API contract — OpenAPI → TypeScript types drift check ─────────────────
  api-contract:
    name: API Contract — Types in Sync
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Export OpenAPI schema
        working-directory: backend
        run: python scripts/export_openapi.py --out ../web/openapi.json

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Re-generate TypeScript types
        working-directory: web
        run: npm run gen:types

      - name: Check for schema drift
        working-directory: web
        run: |
          if ! git diff --exit-code lib/api/types.gen.ts; then
            echo ""
            echo "❌  lib/api/types.gen.ts is out of date."
            echo "    Run 'npm run gen:types' locally and commit the result."
            exit 1
          fi
          echo "✅  TypeScript API types are up to date."
