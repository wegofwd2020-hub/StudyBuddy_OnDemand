name: Backend Tests

on:
  push:
    branches: [main, "2026*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studybuddy_test
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://studybuddy:testpassword@localhost:5432/studybuddy_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: test-secret-do-not-use-in-production-aaaa
      ADMIN_JWT_SECRET: test-admin-secret-do-not-use-in-prod-bbb
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_JWKS_URL: http://localhost:9999/.well-known/jwks.json
      AUTH0_STUDENT_CLIENT_ID: test-student-client-id
      AUTH0_TEACHER_CLIENT_ID: test-teacher-client-id
      AUTH0_MGMT_CLIENT_ID: test-mgmt-client-id
      AUTH0_MGMT_CLIENT_SECRET: test-mgmt-client-secret-aaaaaaaaaaa
      AUTH0_MGMT_API_URL: https://test.auth0.com/api/v2
      SENTRY_DSN: ""
      METRICS_TOKEN: test-metrics-token
      CONTENT_STORE_PATH: /tmp/studybuddy-test-content
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: pytest tests/ -v --tb=short

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/.coverage
