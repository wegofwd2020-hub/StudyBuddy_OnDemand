name: CI

on:
  schedule:
    - cron: "0 13 * * *"  # 8:00 AM EST (UTC-5) daily
  workflow_dispatch:

# Cancel in-progress runs on the same branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend lint + security ───────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install quality tools
        working-directory: backend
        run: pip install ruff==0.9.10 bandit[toml]==1.8.3 pip-audit==2.7.3

      - name: Ruff — lint
        working-directory: backend
        run: ruff check src/

      - name: Ruff — format check
        working-directory: backend
        run: ruff format --check src/

      - name: Bandit — security SAST
        working-directory: backend
        run: bandit -c pyproject.toml -r src/ -ll

      - name: pip-audit — dependency vulnerability scan
        working-directory: backend
        # PYSEC-2024-55: previously ignored
        # GHSA-5239-wwwm-4pmq: pygments transitive dep — no upstream fix available yet
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-55 --ignore-vuln GHSA-5239-wwwm-4pmq

  # ── 2. Backend tests + coverage ──────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studybuddy_test
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://studybuddy:testpassword@localhost:5432/studybuddy_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: test-secret-do-not-use-in-production-aaaa
      ADMIN_JWT_SECRET: test-admin-secret-do-not-use-in-prod-bbb
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_JWKS_URL: http://localhost:9999/.well-known/jwks.json
      AUTH0_STUDENT_CLIENT_ID: test-student-client-id
      AUTH0_TEACHER_CLIENT_ID: test-teacher-client-id
      AUTH0_MGMT_CLIENT_ID: test-mgmt-client-id
      AUTH0_MGMT_CLIENT_SECRET: test-mgmt-client-secret-aaaaaaaaaaa
      AUTH0_MGMT_API_URL: https://test.auth0.com/api/v2
      SENTRY_DSN: ""
      METRICS_TOKEN: test-metrics-token
      CONTENT_STORE_PATH: /tmp/studybuddy-test-content
      APP_ENV: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── 3. Frontend lint + typecheck ─────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: ESLint
        working-directory: web
        run: npm run lint -- --max-warnings=0

      - name: Prettier format check
        working-directory: web
        run: npm run format:check

      - name: TypeScript typecheck
        working-directory: web
        run: npm run typecheck

      - name: npm audit — dependency vulnerability scan
        working-directory: web
        run: npm audit --audit-level=high

  # ── 4. Frontend unit tests ───────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run Vitest unit tests
        working-directory: web
        run: npm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: web/test-results/

  # ── 5. Snyk — dependency vulnerability scan (SARIF → GitHub Security tab) ────
  snyk:
    name: Snyk — Vulnerability Scan
    runs-on: ubuntu-latest
    # Skip on fork PRs where SNYK_TOKEN is unavailable.
    # secrets context is not allowed in job-level if; use a repository variable instead.
    # Set SNYK_ENABLED = 'true' in repo Settings → Variables to activate this job.
    if: ${{ vars.SNYK_ENABLED == 'true' }}
    permissions:
      # Required to upload SARIF results to GitHub Code Scanning.
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Snyk CLI
        run: npm install -g snyk

      # Snyk needs deps installed to resolve the full dependency graph.
      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install Node.js dependencies
        working-directory: web
        run: npm ci

      # Run both scans with continue-on-error so the SARIF upload always runs.
      # Exit codes are captured in environment variables and checked at the end.
      - name: Snyk scan — Python (backend)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=backend/requirements.txt \
            --severity-threshold=high \
            --sarif-file-output=snyk-python.sarif \
            || echo "SNYK_PYTHON_FAILED=1" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Snyk scan — Node.js (web)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test \
            --file=web/package.json \
            --package-manager=npm \
            --severity-threshold=high \
            --sarif-file-output=snyk-node.sarif \
            || echo "SNYK_NODE_FAILED=1" >> "$GITHUB_ENV"
        continue-on-error: true

      - name: Upload Python SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-python.sarif
          category: snyk-python

      - name: Upload Node.js SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-node.sarif
          category: snyk-node

      # Upload SARIF files as artifacts so the build-metadata job can parse counts.
      - name: Upload Python SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-python-sarif
          path: snyk-python.sarif
          retention-days: 1

      - name: Upload Node.js SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-node-sarif
          path: snyk-node.sarif
          retention-days: 1

      # Fail the job after SARIF upload so results are always visible in the
      # Security tab even when the PR is blocked.
      - name: Fail if high/critical vulnerabilities were found
        run: |
          if [ -n "$SNYK_PYTHON_FAILED" ] || [ -n "$SNYK_NODE_FAILED" ]; then
            echo "High or critical severity vulnerabilities found."
            echo "See the Security tab for details: https://github.com/${{ github.repository }}/security/code-scanning"
            exit 1
          fi

  # ── 6. Inject build metadata (Snyk summary + last PR) into Next.js build ──────
  #
  # Runs only on pushes to main so the About page always reflects the live state.
  # Parses Snyk SARIF outputs (produced by the snyk job) and fetches the last
  # merged PR from the GitHub API, then exports env vars consumed by next.config.ts:
  #
  #   SNYK_HIGH_COUNT        — number of open high-severity issues
  #   SNYK_CRITICAL_COUNT    — number of open critical-severity issues
  #   SNYK_SCAN_DATE         — ISO-8601 timestamp of the scan
  #   LAST_PR_NUMBER         — PR number of the most-recently merged PR to main
  #   LAST_PR_TITLE          — PR title
  #   LAST_PR_URL            — GitHub PR URL
  #   LAST_PR_MERGED_AT      — ISO-8601 merge timestamp
  #
  # The Next.js build is NOT run in CI (it runs at deployment); this job writes
  # the values to a build-metadata artifact so the deploy pipeline can source them
  # before running `npm run build`.
  build-metadata:
    name: Collect Build Metadata
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [snyk]
    # snyk is conditional — allow this job to run even if snyk was skipped
    continue-on-error: false
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      # Download Snyk SARIF files produced by the snyk job (may not exist if
      # SNYK_TOKEN is not set — the step is guarded with continue-on-error).
      - name: Download Snyk Python SARIF
        uses: actions/download-artifact@v4
        with:
          name: snyk-python-sarif
          path: sarif/
        continue-on-error: true

      - name: Download Snyk Node SARIF
        uses: actions/download-artifact@v4
        with:
          name: snyk-node-sarif
          path: sarif/
        continue-on-error: true

      - name: Parse Snyk SARIF counts
        id: snyk_counts
        run: |
          python3 - <<'PYEOF'
          import json, os, glob

          high = 0
          critical = 0

          for path in glob.glob("sarif/*.sarif"):
              try:
                  with open(path) as f:
                      data = json.load(f)
                  for run in data.get("runs", []):
                      for result in run.get("results", []):
                          level = result.get("level", "")
                          # Snyk maps: critical → error, high → error (with tag), medium → warning
                          # Check the rule's security-severity property for precision.
                          rule_id = result.get("ruleId", "")
                          rule_props = {}
                          for rule in run.get("tool", {}).get("driver", {}).get("rules", []):
                              if rule.get("id") == rule_id:
                                  rule_props = rule.get("properties", {})
                                  break
                          severity = float(rule_props.get("security-severity", 0))
                          if severity >= 9.0:
                              critical += 1
                          elif severity >= 7.0:
                              high += 1
              except Exception as e:
                  print(f"Warning: could not parse {path}: {e}")

          scan_date = os.environ.get("SCAN_DATE", "")
          env_file = os.environ["GITHUB_ENV"]
          with open(env_file, "a") as f:
              f.write(f"SNYK_HIGH_COUNT={high}\n")
              f.write(f"SNYK_CRITICAL_COUNT={critical}\n")
              f.write(f"SNYK_SCAN_DATE={scan_date}\n")
          print(f"Snyk counts — critical: {critical}, high: {high}")
          PYEOF
        env:
          SCAN_DATE: ${{ github.event.head_commit.timestamp }}

      - name: Fetch last merged PR
        run: |
          PR=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --state merged \
            --base main \
            --limit 1 \
            --json number,title,url,mergedAt \
            --jq '.[0]')

          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No merged PRs found."
            exit 0
          fi

          PR_NUMBER=$(echo "$PR" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('number',''))")
          PR_TITLE=$(echo  "$PR" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('title',''))")
          PR_URL=$(echo    "$PR" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))")
          PR_MERGED=$(echo "$PR" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('mergedAt',''))")

          echo "LAST_PR_NUMBER=${PR_NUMBER}"   >> "$GITHUB_ENV"
          echo "LAST_PR_TITLE=${PR_TITLE}"     >> "$GITHUB_ENV"
          echo "LAST_PR_URL=${PR_URL}"         >> "$GITHUB_ENV"
          echo "LAST_PR_MERGED_AT=${PR_MERGED}" >> "$GITHUB_ENV"
          echo "Last PR: #${PR_NUMBER} — ${PR_TITLE}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Write build-metadata artifact
        run: |
          mkdir -p build-meta
          cat > build-meta/build-metadata.env <<EOF
          SNYK_HIGH_COUNT=${SNYK_HIGH_COUNT}
          SNYK_CRITICAL_COUNT=${SNYK_CRITICAL_COUNT}
          SNYK_SCAN_DATE=${SNYK_SCAN_DATE}
          LAST_PR_NUMBER=${LAST_PR_NUMBER}
          LAST_PR_TITLE=${LAST_PR_TITLE}
          LAST_PR_URL=${LAST_PR_URL}
          LAST_PR_MERGED_AT=${LAST_PR_MERGED_AT}
          EOF
          cat build-meta/build-metadata.env

      - name: Upload build-metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-meta/build-metadata.env
          retention-days: 30

  # ── 7. API contract — OpenAPI → TypeScript types drift check ─────────────────
  api-contract:
    name: API Contract — Types in Sync
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Export OpenAPI schema
        working-directory: backend
        run: python scripts/export_openapi.py --out ../web/openapi.json

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Re-generate TypeScript types
        working-directory: web
        run: npm run gen:types

      - name: Check for schema drift
        working-directory: web
        run: |
          if ! git diff --exit-code lib/api/types.gen.ts; then
            echo ""
            echo "❌  lib/api/types.gen.ts is out of date."
            echo "    Run 'npm run gen:types' locally and commit the result."
            exit 1
          fi
          echo "✅  TypeScript API types are up to date."
